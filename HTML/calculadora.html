<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Calculadora</title>
      <link href="estiloportfolio.css" rel="stylesheet">
      <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
      <link rel="shortcut icon" href="favicon.ico" class="favicon" type="image/x-icon">
      <link href="index.js" rel="actions">
      <title>Calculadora</title>
      <style>
         *{
               margin: 0;
               padding: 0;
         }
         .fundo{
               background-image: linear-gradient(45deg,blue, black);
               height: 100vh;
               color: #fff;
               font-family: Arial, Helvetica, sans-serif;
               text-align: center;
         }
         .calculadora{
               position: absolute;
               background-color: rgba(0, 0, 0, 0.8);
               top: 50%;
               left: 50%;
               transform: translate(-50%,-50%);
               border-radius: 15px;
               padding: 15px;
         }
         .botao{
               width: 50px;
               height: 50px;
               font-size: 25px;
               cursor: pointer;
               margin: 3px;
               background-color: rgb(31,31,31);
               border: none;
               color: #fff;
         }
         .botao:hover{
               background-color: black;
         }
         #resultado{
               background-color: white;
               width: 207px;
               height: 30px;
               margin: 5px;
               font-size: 25px;
               color: black;
               text-align: right;
               padding: 5px;
         }
      </style>
   </head>
   <body>
    <nav class="navbar navbar-expand-lg fixed-top "> 
        <a class="navbar-brand" href="index.html">Início</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSup" aria-controls="navbarSup" aria-expanded="false" aria-label="Toggle navigation"> 
        <span class="navbar-toggler-icon"></span>
       </button>
       <div class="collapse navbar-collapse " id="navbarSup">
            <ul class="navbar-nav mr-4">
        <li class="nav-item">
            <a class="nav-link" data-value="sobremim" href="sobremim.html">Sobre Mim</a>        </li> 
        <li class="nav-item">
            <a class="nav-link" data-value="contato" href="contato.html">Contato</a>        </li>
        <li class="nav-item">
            <a class="nav-link" data-value="outrosprojetos" href="projetos.html">Outros Projetos</a>        </li> 
        </ul>
       </div>
    </nav>
<body>
    <div class="fundo">
        <h1>Igor Oliveira Lima</h1>
        <div class="calculadora">
            <h1>Calculadora</h1>
            <p id="resultado"></p>
            <table>
                <tr>
                    <td><button class="botao" onclick="clean()">C</button></td>
                    <td><button class="botao" onclick="back()"><</button></td>
                    <td><button class="botao" onclick="insert('/')">/</button></td>
                    <td><button class="botao" onclick="insert('*')">X</button></td>
                </tr>
                <tr>
                    <td><button class="botao" onclick="insert('7')">7</button></td>
                    <td><button class="botao" onclick="insert('8')">8</button></td>
                    <td><button class="botao" onclick="insert('9')">9</button></td>
                    <td><button class="botao" onclick="insert('-')">-</button></td>
                </tr>
                <tr>
                    <td><button class="botao" onclick="insert('4')">4</button></td>
                    <td><button class="botao" onclick="insert('5')">5</button></td>
                    <td><button class="botao" onclick="insert('6')">6</button></td>
                    <td><button class="botao" onclick="insert('+')">+</button></td>
                </tr>
                <tr>
                    <td><button class="botao" onclick="insert('1')">1</button></td>
                    <td><button class="botao" onclick="insert('2')">2</button></td>
                    <td><button class="botao" onclick="insert('3')">3</button></td>
                    <td rowspan="2"><button class="botao" style="height: 106px;" onclick="calcular()">=</button></td>
                </tr>
                <tr>
                    <td colspan="2"><button class="botao" style="width: 106px;" onclick="insert('0')">0</button></td>
                    <td><button class="botao" onclick="insert('.')">.</button></td>
                </tr>
            </table>
        </div>
    </div>
    <script>
        function insert(num)
        {
            var numero = document.getElementById('resultado').innerHTML;
            document.getElementById('resultado').innerHTML = numero + num;
        }
        function clean()
        {
            document.getElementById('resultado').innerHTML = "";
        }
        function back()
        {
            var resultado = document.getElementById('resultado').innerHTML;
            document.getElementById('resultado').innerHTML = resultado.substring(0, resultado.length -1);
        }
        function calcular()
        {
            var resultado = document.getElementById('resultado').innerHTML;
            if(resultado)
            {
                document.getElementById('resultado').innerHTML = eval(resultado);
            }
            else
            {
                document.getElementById('resultado').innerHTML = "Nada..."
            }
        }
   </script>
   <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</body>
</html>
